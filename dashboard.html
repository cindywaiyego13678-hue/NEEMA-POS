<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard — Appliance Shop</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2137">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="topbar">
    <h1>📊 Owner Dashboard</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="role-tag" id="staff-name">...</span>
      <button class="secondary" onclick="logout()" style="color:#fff; border-color:#3a5169;">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="nav-tabs" id="nav-tabs"></div>

    <div class="grid grid-4" style="margin-bottom:20px;">
      <div class="stat-card">
        <div class="label">Today's Revenue</div>
        <div class="value good" id="stat-today-revenue">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Today's Sales</div>
        <div class="value" id="stat-today-count">—</div>
      </div>
      <div class="stat-card">
        <div class="label">This Week</div>
        <div class="value" id="stat-week-revenue">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Low Stock Items</div>
        <div class="value alert" id="stat-low-stock">—</div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns: 1.2fr 1fr;">
      <div class="card">
        <h3 style="margin-top:0;">Recent Sales</h3>
        <div id="recent-sales" style="max-height:400px; overflow-y:auto;"></div>
      </div>

      <div class="card">
        <h3 style="margin-top:0;">⚠️ Low Stock</h3>
        <div id="low-stock-list"></div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">🏆 Top Sellers (Last 30 Days)</h3>
      <div id="top-sellers"></div>
    </div>
  </div>

  <script src="js/offline-cache.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    let currentStaff = null;

    (async () => {
      currentStaff = await requireAuth(['admin']);
      if (!currentStaff) return;
      document.getElementById('staff-name').textContent = `${currentStaff.full_name} (owner)`;
      renderNav();
      await Promise.all([
        loadStats(),
        loadRecentSales(),
        loadLowStock(),
        loadTopSellers()
      ]);
      setInterval(() => {
        loadStats();
        loadRecentSales();
      }, 60000);
    })();

    function renderNav() {
      document.getElementById('nav-tabs').innerHTML = `
        <a href="pos.html">POS</a>
        <a href="inventory.html">Inventory</a>
        <a href="dashboard.html" class="active">Dashboard</a>
       <a href="staff.html">Staff</a>
       <a href="reports.html">Reports</a>
      `;
    }

    function startOfDayISO() {
      const d = new Date(); d.setHours(0,0,0,0); return d.toISOString();
    }
    function startOfWeekISO() {
      const d = new Date();
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      d.setDate(diff); d.setHours(0,0,0,0);
      return d.toISOString();
    }

    async function loadStats() {
      const todayStart = startOfDayISO();
      const weekStart = startOfWeekISO();

      const { data: todaySales } = await supabaseClient
        .from('sales').select('total_amount').eq('status','completed').gte('created_at', todayStart);
      const { data: weekSales } = await supabaseClient
        .from('sales').select('total_amount').eq('status','completed').gte('created_at', weekStart);
      const { data: lowStock } = await supabaseClient
        .from('products').select('id, stock_quantity, reorder_level').eq('is_active', true);

      const todayRevenue = (todaySales || []).reduce((s, r) => s + Number(r.total_amount), 0);
      const weekRevenue = (weekSales || []).reduce((s, r) => s + Number(r.total_amount), 0);
      const lowStockCount = (lowStock || []).filter(p => p.stock_quantity <= (p.reorder_level ?? 2)).length;

      document.getElementById('stat-today-revenue').textContent = `Ksh ${todayRevenue.toLocaleString()}`;
      document.getElementById('stat-today-count').textContent = (todaySales || []).length;
      document.getElementById('stat-week-revenue').textContent = `Ksh ${weekRevenue.toLocaleString()}`;
      document.getElementById('stat-low-stock').textContent = lowStockCount;
    }

    async function loadRecentSales() {
      const { data, error } = await supabaseClient
        .from('sales')
        .select('*, staff(full_name), sale_items(*, products(name))')
        .order('created_at', { ascending: false })
        .limit(15);
      const el = document.getElementById('recent-sales');
      if (error || !data || !data.length) {
        el.innerHTML = '<div class="empty-state">No sales yet.</div>';
        return;
      }
      el.innerHTML = data.map(s => {
        const items = (s.sale_items || []).map(i => `${i.products?.name}${i.quantity > 1 ? ' x' + i.quantity : ''}`).filter(Boolean).join(', ');
        const time = new Date(s.created_at).toLocaleString('en-KE', { dateStyle: 'medium', timeStyle: 'short' });
        return `
          <div style="padding:8px 0; border-bottom:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between;">
              <strong>Ksh ${Number(s.total_amount).toLocaleString()}</strong>
              <span class="badge in_stock">${s.payment_method}</span>
            </div>
            <div style="font-size:0.8rem; color:var(--muted);">${escapeHtml(items)}</div>
            <div style="font-size:0.75rem; color:var(--muted);">${time} · ${s.staff?.full_name || 'staff'}</div>
          </div>`;
      }).join('');
    }

    async function loadLowStock() {
      const { data, error } = await supabaseClient
        .from('products').select('id, name, stock_quantity, reorder_level').eq('is_active', true);
      const el = document.getElementById('low-stock-list');
      const low = (data || []).filter(p => p.stock_quantity <= (p.reorder_level ?? 2));
      if (error || !low.length) {
        el.innerHTML = '<div class="empty-state">All stock levels healthy.</div>';
        return;
      }
      el.innerHTML = low.map(p => `
        <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.88rem;">
          <span>${escapeHtml(p.name)}</span>
          <span class="badge low">${p.stock_quantity} left</span>
        </div>`).join('');
    }

    async function loadTopSellers() {
      const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString();
      const { data, error } = await supabaseClient
        .from('sale_items')
        .select('product_id, unit_price, quantity, products(name), sales!inner(created_at, status)')
        .gte('sales.created_at', thirtyDaysAgo)
        .eq('sales.status', 'completed');

      const el = document.getElementById('top-sellers');
      if (error || !data || !data.length) {
        el.innerHTML = '<div class="empty-state">No sales in the last 30 days.</div>';
        return;
      }

      const tally = {};
      data.forEach(item => {
        const name = item.products?.name || 'Unknown';
        if (!tally[name]) tally[name] = { count: 0, revenue: 0 };
        tally[name].count += item.quantity || 1;
        tally[name].revenue += Number(item.unit_price) * (item.quantity || 1);
      });
      const sorted = Object.entries(tally).sort((a,b) => b[1].count - a[1].count).slice(0, 8);

      el.innerHTML = `
        <table>
          <thead><tr><th>Product</th><th>Units Sold</th><th>Revenue</th></tr></thead>
          <tbody>
            ${sorted.map(([name, s]) => `
              <tr><td>${escapeHtml(name)}</td><td>${s.count}</td><td>Ksh ${s.revenue.toLocaleString()}</td></tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
