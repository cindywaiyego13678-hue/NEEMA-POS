<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS — Appliance Shop</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2137">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="topbar">
    <h1>🛒 Point of Sale</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="sync-badge"></span>
      <span class="role-tag" id="staff-name">...</span>
      <button class="secondary" onclick="logout()" style="color:#fff; border-color:#3a5169;">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="nav-tabs" id="nav-tabs"></div>

    <div class="grid" style="grid-template-columns: 1.3fr 1fr;">
      <div class="card">
        <div class="field">
          <label>Search product</label>
          <input type="text" id="product-search" placeholder="Type name or type...">
        </div>
        <div id="product-list" style="max-height:340px; overflow-y:auto;"></div>

        <div style="border-top:1px solid var(--border); margin-top:14px; padding-top:14px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;">Held Sales</h3>
          </div>
          <div id="held-sales-list" style="margin-top:8px;"></div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3 style="margin-top:0; margin-bottom:0;">Current Sale</h3>
          <button class="secondary" style="padding:6px 10px; font-size:0.8rem;" onclick="holdSale()">Hold Sale</button>
        </div>
        <div id="cart-items"></div>

        <div class="field" style="margin-top:10px;">
          <label>Discount (Ksh)</label>
          <input type="number" id="discount-amount" min="0" placeholder="0" value="0">
        </div>

        <div style="border-top:1px solid var(--border); margin-top:10px; padding-top:10px;">
          <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--muted);">
            <span>Subtotal</span>
            <span id="cart-subtotal">Ksh 0</span>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--muted);">
            <span>Discount</span>
            <span id="cart-discount">− Ksh 0</span>
          </div>
          <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem; margin-top:4px;">
            <span>Total</span>
            <span id="cart-total">Ksh 0</span>
          </div>
        </div>

        <div class="field" style="margin-top:14px;">
          <label>Customer name (optional)</label>
          <input type="text" id="customer-name" placeholder="Walk-in customer">
        </div>
        <div class="field">
          <label>Customer phone (optional)</label>
          <input type="tel" id="customer-phone" placeholder="07XXXXXXXX">
        </div>
        <div class="field">
          <label>Payment method</label>
          <select id="payment-method">
            <option value="mpesa">M-Pesa</option>
            <option value="cash">Cash</option>
            <option value="card">Card</option>
          </select>
        </div>

        <button id="checkout-btn" style="width:100%;" onclick="checkout()">Complete Sale</button>
        <p class="error-text" id="checkout-error" style="display:none;"></p>
      </div>
    </div>
  </div>

  <!-- Receipt modal -->
  <div id="receipt-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:60;"></div>
  <div id="receipt-panel" class="card" style="display:none; position:fixed; top:5%; left:50%; transform:translateX(-50%); width:92%; max-width:380px; z-index:70; max-height:88vh; overflow-y:auto;">
    <div id="receipt-content" style="font-family: 'Courier New', monospace; font-size:0.85rem; line-height:1.5;"></div>
    <div style="display:flex; gap:8px; margin-top:16px;">
      <button style="flex:1;" onclick="printReceipt()">🖨️ Print</button>
      <button class="gold" style="flex:1;" onclick="shareReceiptWhatsapp()">📱 WhatsApp</button>
    </div>
    <button class="secondary" style="width:100%; margin-top:8px;" onclick="closeReceipt()">Close</button>
  </div>

  <script src="js/offline-cache.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/offline-sync.js"></script>
  <script>
    let cart = []; // { product, quantity }
    let allProducts = [];
    let currentStaff = null;
    let lastReceiptData = null;
    const HELD_SALES_KEY = 'appliance_pos_held_sales';

    (async () => {
      currentStaff = await requireAuth(['admin','manager','cashier']);
      if (!currentStaff) return;
      document.getElementById('staff-name').textContent = `${currentStaff.full_name} (${currentStaff.role})`;
      renderNav(currentStaff.role);
      await loadProducts();
      renderHeldSales();
    })();

    function renderNav(role) {
      const tabs = [{ href: 'pos.html', label: 'POS' }];
      if (role === 'admin' || role === 'manager') tabs.push({ href: 'inventory.html', label: 'Inventory' });
      if (role === 'admin') tabs.push({ href: 'dashboard.html', label: 'Dashboard' });
      if (role === 'admin') tabs.push({ href: 'staff.html', label: 'Staff' });
      if (role === 'admin') tabs.push({ href: 'reports.html', label: 'Reports' });
      document.getElementById('nav-tabs').innerHTML = tabs.map(t =>
        `<a href="${t.href}" class="${t.href === 'pos.html' ? 'active' : ''}">${t.label}</a>`
      ).join('');
    }

    async function loadProducts() {
      if (!navigator.onLine) {
        const cached = cacheGet('products_list');
        if (cached) {
          allProducts = cached.data;
          showOfflineBanner(cached.cachedAt);
          renderProductList(allProducts);
        }
        return;
      }
      const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .eq('is_active', true)
        .order('name');
      if (error) {
        console.error(error);
        const cached = cacheGet('products_list');
        if (cached) {
          allProducts = cached.data;
          showOfflineBanner(cached.cachedAt);
          renderProductList(allProducts);
        }
        return;
      }
      hideOfflineBanner();
      allProducts = data;
      cacheSet('products_list', data);
      renderProductList(allProducts);
    }

    function renderProductList(products) {
      const el = document.getElementById('product-list');
      if (!products.length) { el.innerHTML = '<div class="empty-state">No products found.</div>'; return; }
      el.innerHTML = products.map(p => `
        <div class="card" style="margin-bottom:8px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>${escapeHtml(p.name)}</strong>
            <div style="font-size:0.8rem; color:var(--muted);">${escapeHtml(p.category || '')} · Ksh ${Number(p.price).toLocaleString()} · ${p.stock_quantity} in stock</div>
          </div>
          <button ${p.stock_quantity <= 0 ? 'disabled' : ''} onclick='addToCart(${JSON.stringify(p.id)})'>Add</button>
        </div>`).join('');
    }

    document.getElementById('product-search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderProductList(allProducts.filter(p =>
        p.name.toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q)
      ));
    });

    function addToCart(productId) {
      const product = allProducts.find(p => p.id === productId);
      const existing = cart.find(item => item.product.id === productId);
      const currentCartQty = existing ? existing.quantity : 0;

      if (currentCartQty + 1 > product.stock_quantity) { alert('Not enough stock available.'); return; }

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ product, quantity: 1 });
      }
      renderCart();
    }

    function changeQuantity(index, delta) {
      const item = cart[index];
      const newQty = item.quantity + delta;
      if (newQty <= 0) { cart.splice(index, 1); renderCart(); return; }
      if (newQty > item.product.stock_quantity) { alert('Not enough stock available.'); return; }
      item.quantity = newQty;
      renderCart();
    }

    function getSubtotal() {
      return cart.reduce((sum, item) => sum + Number(item.product.price) * item.quantity, 0);
    }

    function getDiscount() {
      const val = parseFloat(document.getElementById('discount-amount').value);
      return isNaN(val) || val < 0 ? 0 : val;
    }

    function renderCart() {
      const el = document.getElementById('cart-items');
      if (!cart.length) {
        el.innerHTML = '<div class="empty-state">Cart is empty</div>';
      } else {
        el.innerHTML = cart.map((item, i) => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border);">
            <div>
              <div style="font-weight:600; font-size:0.9rem;">${escapeHtml(item.product.name)}</div>
              <div style="font-size:0.75rem; color:var(--muted);">Ksh ${Number(item.product.price).toLocaleString()} each</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <button class="secondary" style="padding:2px 8px;" onclick="changeQuantity(${i}, -1)">−</button>
              <span>${item.quantity}</span>
              <button class="secondary" style="padding:2px 8px;" onclick="changeQuantity(${i}, 1)">+</button>
            </div>
          </div>
        `).join('');
      }
      updateTotals();
    }

    function updateTotals() {
      const subtotal = getSubtotal();
      const discount = Math.min(getDiscount(), subtotal);
      const total = subtotal - discount;
      document.getElementById('cart-subtotal').textContent = `Ksh ${subtotal.toLocaleString()}`;
      document.getElementById('cart-discount').textContent = `− Ksh ${discount.toLocaleString()}`;
      document.getElementById('cart-total').textContent = `Ksh ${total.toLocaleString()}`;
    }
    document.getElementById('discount-amount').addEventListener('input', updateTotals);

    // ---------- Hold / Resume sales ----------
    function getHeldSales() {
      try { return JSON.parse(localStorage.getItem(HELD_SALES_KEY)) || []; }
      catch (e) { return []; }
    }
    function saveHeldSales(list) {
      localStorage.setItem(HELD_SALES_KEY, JSON.stringify(list));
    }

    function holdSale() {
      if (!cart.length) { alert('Cart is empty — nothing to hold.'); return; }
      const label = prompt('Label this held sale (e.g. customer name):', document.getElementById('customer-name').value || 'Held sale');
      if (label === null) return;

      const held = getHeldSales();
      held.push({
        id: Date.now(),
        label,
        cart: cart.map(item => ({ productId: item.product.id, quantity: item.quantity })),
        discount: getDiscount(),
        customerName: document.getElementById('customer-name').value,
        customerPhone: document.getElementById('customer-phone').value,
        heldAt: new Date().toISOString()
      });
      saveHeldSales(held);

      cart = [];
      document.getElementById('discount-amount').value = 0;
      document.getElementById('customer-name').value = '';
      document.getElementById('customer-phone').value = '';
      renderCart();
      renderHeldSales();
    }

    function renderHeldSales() {
      const held = getHeldSales();
      const el = document.getElementById('held-sales-list');
      if (!held.length) { el.innerHTML = '<div class="empty-state" style="padding:12px;">No held sales</div>'; return; }
      el.innerHTML = held.map(h => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.85rem;">
          <div>
            <strong>${escapeHtml(h.label)}</strong>
            <div style="color:var(--muted); font-size:0.75rem;">${h.cart.length} item(s)</div>
          </div>
          <div style="display:flex; gap:6px;">
            <button class="secondary" style="padding:4px 8px; font-size:0.75rem;" onclick="resumeSale(${h.id})">Resume</button>
            <button class="danger" style="padding:4px 8px; font-size:0.75rem;" onclick="discardHeldSale(${h.id})">✕</button>
          </div>
        </div>`).join('');
    }

    function resumeSale(holdId) {
      if (cart.length && !confirm('This will replace your current cart. Continue?')) return;
      const held = getHeldSales();
      const entry = held.find(h => h.id === holdId);
      if (!entry) return;

      cart = entry.cart
        .map(ci => {
          const product = allProducts.find(p => p.id === ci.productId);
          return product ? { product, quantity: ci.quantity } : null;
        })
        .filter(Boolean);

      document.getElementById('discount-amount').value = entry.discount || 0;
      document.getElementById('customer-name').value = entry.customerName || '';
      document.getElementById('customer-phone').value = entry.customerPhone || '';

      saveHeldSales(held.filter(h => h.id !== holdId));
      renderCart();
      renderHeldSales();
    }

    function discardHeldSale(holdId) {
      if (!confirm('Discard this held sale?')) return;
      saveHeldSales(getHeldSales().filter(h => h.id !== holdId));
      renderHeldSales();
    }

    // ---------- Checkout ----------
    async function checkout() {
      const errorEl = document.getElementById('checkout-error');
      errorEl.style.display = 'none';

      if (!cart.length) {
        errorEl.textContent = 'Cart is empty.';
        errorEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('checkout-btn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      const subtotal = getSubtotal();
      const discount = Math.min(getDiscount(), subtotal);
      const total = subtotal - discount;
      const paymentMethod = document.getElementById('payment-method').value;
      const customerName = document.getElementById('customer-name').value.trim() || null;
      const customerPhone = document.getElementById('customer-phone').value.trim() || null;

      const saleData = {
        cashier_id: currentStaff.id,
        customer_name: customerName,
        customer_phone: customerPhone,
        payment_method: paymentMethod,
        total_amount: total,
        subtotal_amount: subtotal,
        discount_amount: discount,
        status: 'completed',
        items: cart.map(item => ({
          product_id: item.product.id,
          unit_price: item.product.price,
          quantity: item.quantity
        }))
      };

      const receiptItems = cart.map(item => ({
        name: item.product.name, quantity: item.quantity, price: item.product.price
      }));

      try {
        if (!navigator.onLine) throw new Error('offline');

        const { items, ...saleFields } = saleData;
        const { data: insertedSale, error: saleError } = await supabaseClient
          .from('sales').insert(saleFields).select().single();
        if (saleError) throw saleError;

        const itemsToInsert = items.map(it => ({ ...it, sale_id: insertedSale.id }));
        const { error: itemsError } = await supabaseClient.from('sale_items').insert(itemsToInsert);
        if (itemsError) throw itemsError;

        for (const it of items) {
          const product = allProducts.find(p => p.id === it.product_id);
          const newQty = Math.max(0, product.stock_quantity - it.quantity);
          await supabaseClient.from('products').update({ stock_quantity: newQty }).eq('id', it.product_id);
        }

        showReceipt({ items: receiptItems, subtotal, discount, total, paymentMethod, customerName, customerPhone, date: new Date() });
      } catch (err) {
        console.warn('Online checkout failed, queueing offline', err);
        await queueSaleOffline(saleData);
        showReceipt({ items: receiptItems, subtotal, discount, total, paymentMethod, customerName, customerPhone, date: new Date(), offline: true });
        const pending = await getPendingSales();
        updateSyncBadge(pending.length);
      }

      cart = [];
      renderCart();
      document.getElementById('discount-amount').value = 0;
      document.getElementById('customer-name').value = '';
      document.getElementById('customer-phone').value = '';
      btn.disabled = false;
      btn.textContent = 'Complete Sale';
      await loadProducts();
    }

    // ---------- Receipt ----------
    function showReceipt(data) {
      lastReceiptData = data;
      const shopName = 'Appliance Shop';
      const lines = data.items.map(it =>
        `${it.name} x${it.quantity}`.padEnd(28) + `Ksh ${(it.price * it.quantity).toLocaleString()}`
      ).join('\n');

      document.getElementById('receipt-content').innerHTML = `
        <div style="text-align:center; margin-bottom:10px;">
          <strong style="font-size:1rem;">${escapeHtml(shopName)}</strong><br>
          <span style="font-size:0.75rem; color:var(--muted);">${data.date.toLocaleString('en-KE', { dateStyle: 'medium', timeStyle: 'short' })}</span>
        </div>
        <div style="border-top:1px dashed var(--border); border-bottom:1px dashed var(--border); padding:8px 0; margin:8px 0; white-space:pre-wrap;">${escapeHtml(lines)}</div>
        <div style="display:flex; justify-content:space-between;"><span>Subtotal</span><span>Ksh ${data.subtotal.toLocaleString()}</span></div>
        ${data.discount > 0 ? `<div style="display:flex; justify-content:space-between;"><span>Discount</span><span>− Ksh ${data.discount.toLocaleString()}</span></div>` : ''}
        <div style="display:flex; justify-content:space-between; font-weight:700; margin-top:4px;"><span>TOTAL</span><span>Ksh ${data.total.toLocaleString()}</span></div>
        <div style="margin-top:8px; font-size:0.8rem; color:var(--muted);">Payment: ${escapeHtml(data.paymentMethod)}</div>
        ${data.customerName ? `<div style="font-size:0.8rem; color:var(--muted);">Customer: ${escapeHtml(data.customerName)}</div>` : ''}
        ${data.offline ? `<div style="margin-top:8px; color:var(--gold); font-size:0.8rem;">⚠️ Saved offline — will sync when back online</div>` : ''}
        <div style="text-align:center; margin-top:12px; font-size:0.8rem; color:var(--muted);">Thank you for your business!</div>
      `;
      document.getElementById('receipt-overlay').style.display = 'block';
      document.getElementById('receipt-panel').style.display = 'block';
    }

    function closeReceipt() {
      document.getElementById('receipt-overlay').style.display = 'none';
      document.getElementById('receipt-panel').style.display = 'none';
    }

    function printReceipt() {
      const content = document.getElementById('receipt-content').innerHTML;
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html><head><title>Receipt</title>
        <style>body{font-family:'Courier New',monospace; font-size:13px; padding:20px;}</style>
        </head><body>${content}</body></html>
      `);
      printWindow.document.close();
      printWindow.print();
    }

    function shareReceiptWhatsapp() {
      if (!lastReceiptData) return;
      const d = lastReceiptData;
      const lines = d.items.map(it => `${it.name} x${it.quantity} - Ksh ${(it.price * it.quantity).toLocaleString()}`).join('%0A');
      let text = `*Appliance Shop Receipt*%0A${d.date.toLocaleString('en-KE')}%0A%0A${lines}%0A%0ASubtotal: Ksh ${d.subtotal.toLocaleString()}`;
      if (d.discount > 0) text += `%0ADiscount: -Ksh ${d.discount.toLocaleString()}`;
      text += `%0A*TOTAL: Ksh ${d.total.toLocaleString()}*%0A%0AThank you for your business!`;

      const phone = d.customerPhone ? d.customerPhone.replace(/\D/g, '') : '';
      const waUrl = phone
        ? `https://wa.me/${phone.startsWith('0') ? '254' + phone.slice(1) : phone}?text=${text}`
        : `https://wa.me/?text=${text}`;
      window.open(waUrl, '_blank');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
