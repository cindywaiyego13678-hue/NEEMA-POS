name: Keep Supabase Project Active

# Runs every 3 days, plus lets you trigger it manually anytime
# from the Actions tab if you want to test it immediately.
on:
  schedule:
    - cron: '0 6 */3 * *'   # 6:00 AM UTC, every 3 days
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (any request counts as activity)
        run: |
          curl --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Ping sent (any response, including 401/403, still counts as activity and prevents the pause)."
